version: 2
updates:
  - package-ecosystem: npm
    directories:
      - /
      - /landing
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    cooldown:
      default-days: 3
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      npm-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: Etc/UTC
    cooldown:
      default-days: 3
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
      include: scope
