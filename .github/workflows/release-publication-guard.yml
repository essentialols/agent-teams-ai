name: Release Publication Guard

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-publication-guard-${{ github.event.release.id }}
  cancel-in-progress: false

jobs:
  verify-stable-release:
    if: ${{ github.event.release.prerelease == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout guard from the default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Verify updater channel or return release to draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_ID: ${{ github.event.release.id }}
          REDRAFT_INCOMPLETE_RELEASE: 'true'
        run: bash scripts/ci/verify-published-updater-release.sh
